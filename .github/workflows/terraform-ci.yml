# =============================================================================
# Terraform CI — Runs on every Pull Request
# Format check → Validate → Security scan → Plan
# =============================================================================

name: "Terraform CI"

on:
  pull_request:
    branches: [main]
    paths:
      - 'environments/**'
      - 'modules/**'

permissions:
  contents: read
  pull-requests: write

env:
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  TF_VERSION: "1.9.8"

jobs:
  # ---- Format & Validate all modules ----
  validate:
    name: "Validate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Validate Dev
        working-directory: environments/dev
        run: |
          terraform init -backend=false
          terraform validate

      - name: Validate UAT
        working-directory: environments/uat
        run: |
          terraform init -backend=false
          terraform validate

      - name: Validate Prod
        working-directory: environments/prod
        run: |
          terraform init -backend=false
          terraform validate

  # ---- Security Scan with tfsec ----
  security:
    name: "Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: tfsec scan
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          soft_fail: true
          additional_args: --minimum-severity MEDIUM

  # ---- Plan (shows what will change) ----
  plan:
    name: "Plan ${{ matrix.env }}"
    runs-on: ubuntu-latest
    needs: [validate, security]
    strategy:
      matrix:
        env: [dev]    # Only plan dev on PRs. Add uat/prod for full pipeline.
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: environments/${{ matrix.env }}
        run: terraform init

      - name: Terraform Plan
        working-directory: environments/${{ matrix.env }}
        id: plan
        run: terraform plan -no-color -input=false
        continue-on-error: true

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const output = `#### Terraform Plan: \`${{ matrix.env }}\`
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            *Triggered by @${{ github.actor }} on \`${{ github.event_name }}\`*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output.substring(0, 65536)
            });
