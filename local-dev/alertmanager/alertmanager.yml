# =============================================================================
# Alertmanager Configuration
# Routes: critical → Slack #alerts, warning → Slack #warnings, all → email
# Set SLACK_WEBHOOK_URL in .env to enable Slack notifications
# =============================================================================

global:
  resolve_timeout: 5m
  slack_api_url: "${SLACK_WEBHOOK_URL}"

templates:
  - "/etc/alertmanager/templates/*.tmpl"

route:
  group_by: ["alertname", "severity"]
  group_wait:      30s
  group_interval:  5m
  repeat_interval: 12h
  receiver: "default"

  routes:
    - matchers:
        - severity = critical
      receiver: "slack-critical"
      repeat_interval: 1h

    - matchers:
        - severity = warning
      receiver: "slack-warning"
      repeat_interval: 6h

inhibit_rules:
  # If a critical fires, suppress the same warning
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: ["alertname", "instance"]

receivers:

  - name: "default"
    slack_configs:
      - channel: "${SLACK_CHANNEL:-#alerts}"
        send_resolved: true
        title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          *Environment:* {{ .Labels.environment }}
          {{ end }}

  - name: "slack-critical"
    slack_configs:
      - channel: "${SLACK_CHANNEL:-#alerts}"
        send_resolved: true
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
        title: '🚨 CRITICAL: {{ .CommonLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
          *Summary:* {{ .Annotations.summary }}
          *Details:* {{ .Annotations.description }}
          {{ if .Annotations.runbook }}*Runbook:* {{ .Annotations.runbook }}{{ end }}
          {{ end }}

  - name: "slack-warning"
    slack_configs:
      - channel: "${SLACK_CHANNEL:-#alerts}"
        send_resolved: true
        color: '{{ if eq .Status "firing" }}warning{{ else }}good{{ end }}'
        title: '⚠️ WARNING: {{ .CommonLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
          *Summary:* {{ .Annotations.summary }}
          {{ end }}
